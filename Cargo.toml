[package]
name = "aicent"
version = "0.1.0-alpha"
edition = "2024"
authors = ["Aicent Stack Team <alliances@aicent.com>"]
description = "The Cognitive Orchestration Layer of the Aicent Stack: Sovereign Identity and Intent Sharding."
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack/aicent"
homepage = "http://aicent.com"
documentation = "https://github.com/Aicent-Stack/aicent/blob/main/README.md"
readme = "README.md"
rust-version = "1.85.0"

# -----------------------------------------------------------------------------
# SEARCH & DISCOVERY: Dominating the Cognitive Namespace
# -----------------------------------------------------------------------------
keywords = [
    "sovereign-ai",
    "orchestration",
    "cognitive-hub",
    "rfc-001",
    "intelligence"
]
categories = [
    "ai",
    "asynchronous",
    "science",
    "distributed-computing"
]

# -----------------------------------------------------------------------------
# THE NEURAL CORE: Mandatory Dependencies for Alpha Verification
# Note: For the placeholder publish, we use direct versions to ensure 
# crates.io compatibility without relying on the local workspace.
# -----------------------------------------------------------------------------
[dependencies]
# Essential concurrency for 128-bit identity state manifolds.
crossbeam = "0.8"

# Industrial-grade serialization for cognitive pulses.
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# High-performance asynchronous orchestration.
tokio = { version = "1.37", features = ["full"] }

# System diagnostics and telemetry hooks.
anyhow = "1.0"
tracing = "0.1"
async-trait = "0.1"
once_cell = "1.19"

# -----------------------------------------------------------------------------
# PROJECT STRUCTURE
# -----------------------------------------------------------------------------
[lib]
name = "aicent"
path = "src/lib.rs"

# -----------------------------------------------------------------------------
# RELEASE PROFILE: Optimized for Sovereign Decision Finality
# -----------------------------------------------------------------------------
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"

# [STRATEGIC NOTE]
# We are flattening the workspace inheritance into this local file to ensure 
# that crates.io can verify the package as a self-contained entity.