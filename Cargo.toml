[package]
name = "aicent"
description = "Aicent Brain: Sovereign AI Identity and Cognitive Orchestration Protocol [RFC-001]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://aicent.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-001-AICENT-BRAIN.md"
keywords = ["sovereign-ai", "orchestration", "cognitive-hub", "rfc-001", "aicent-stack"]
categories = ["ai", "asynchronous", "science", "distributed-computing"]
rust-version = "1.75"

[dependencies]
# --- Core Organism Linking ---
# The Brain acts as the central orchestrator for the entire biological organism.
# Note: These dependencies are linked via workspace to ensure metabolic consistency.
rttp       = { workspace = true }
rpki       = { workspace = true }
zcmk       = { workspace = true }
gtiot      = { workspace = true }
aicent-net = { workspace = true, optional = true }

# --- Cognitive Orchestration Logic ---
# High-fidelity primitives for intent decomposition and state-manifold reasoning.
serde       = { workspace = true, features = ["derive"] }
anyhow      = { workspace = true }
tokio       = { workspace = true, features = ["full"] }
tracing     = { workspace = true }        # Industrial-grade telemetry for cognitive cycles
async-trait = { workspace = true }        # Trait abstraction for Sovereign AID orchestration
once_cell   = { workspace = true }        # High-performance static state management

[dev-dependencies]
# Benchmarking tools for validation of sub-ms cognitive resolution
criterion = { workspace = true }
