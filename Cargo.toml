[package]
name = "aicent"
version = "0.1.0-alpha"
edition = "2024"
authors = ["Aicent Stack Team <alliances@aicent.com>"]
description = "The Cognitive Orchestration Layer of the Aicent Stack: Sovereign Identity and Intent Sharding."
license = "Apache-2.0"
repository = "https://github.com/Aicent-Stack/aicent"
homepage = "http://aicent.com"
documentation = "https://github.com/Aicent-Stack/aicent/blob/main/README.md"
readme = "README.md"
rust-version = "1.85.0"

# -----------------------------------------------------------------------------
# SEARCH & DISCOVERY: Standardized for crates.io Indexing
# -----------------------------------------------------------------------------
keywords = [
    "sovereign-ai",
    "orchestration",
    "cognitive-hub",
    "rfc-001",
    "intelligence"
]

# Using only officially supported slugs from crates.io/category_slugs
categories = [
    "asynchronous",
    "network-programming",
    "science",
    "cryptography",
    "concurrency"
]

# -----------------------------------------------------------------------------
# THE NEURAL CORE: Mandatory Dependencies for Alpha Verification
# -----------------------------------------------------------------------------
[dependencies]
crossbeam = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.37", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"
async-trait = "0.1"
once_cell = "1.19"

# -----------------------------------------------------------------------------
# PROJECT STRUCTURE
# -----------------------------------------------------------------------------
[lib]
name = "aicent"
path = "src/lib.rs"

# -----------------------------------------------------------------------------
# RELEASE PROFILE
# -----------------------------------------------------------------------------
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"